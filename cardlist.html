<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Nexa Front カードリスト</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="page-header">
    <h1>カードリスト</h1>
    <a href="index.html">TOPへ戻る</a>
  </header>

  <p id="cardCount">0枚</p>

  <input
    type="text"
    id="cardSearch"
    placeholder="カード名検索..."
    oninput="searchCards()"
  >
<button class="filter-toggle" onclick="toggleFilters()">絞り込み ▼</button>

<div id="filterArea" style="display:none;">


  <h3>勢力</h3>
<div class="filters">
  <button data-filter="faction-all" onclick="filterCards('all')">全部</button>
  <button data-filter="faction-Royal" onclick="filterCards('Royal')">ロイヤル</button>
  <button data-filter="faction-Flag" onclick="filterCards('Flag')">ロイヤル・旗</button>
  <button data-filter="faction-Necro" onclick="filterCards('Necro')">ネクロ</button>
  <button data-filter="faction-Mei" onclick="filterCards('Mei')">ネクロ・冥</button>
  <button data-filter="faction-Neutral" onclick="filterCards('Neutral')">ニュートラル</button>
</div>

<h3>カードタイプ</h3>
<div class="filters">
  <button data-filter="type-all" onclick="filterType('all')">全部</button>
  <button data-filter="type-Unit" onclick="filterType('Unit')">ユニット</button>
  <button data-filter="type-Spell" onclick="filterType('Spell')">呪文</button>
  <button data-filter="type-Weapon" onclick="filterType('Weapon')">武器</button>
</div>

<h3>レア度</h3>
<div class="filters">
  <button data-filter="rarity-all" onclick="filterRarity('all')">全部</button>
  <button data-filter="rarity-SR" onclick="filterRarity('SR')">SR</button>
  <button data-filter="rarity-VR" onclick="filterRarity('VR')">VR</button>
  <button data-filter="rarity-R" onclick="filterRarity('R')">R</button>
  <button data-filter="rarity-U" onclick="filterRarity('U')">U</button>
  <button data-filter="rarity-C" onclick="filterRarity('C')">C</button>
</div>

<h3>コスト</h3>
<div class="filters">
  <button data-filter="cost-all" onclick="filterCost('all')">全部</button>
  <button data-filter="cost-2" onclick="filterCost(2)">2</button>
  <button data-filter="cost-3" onclick="filterCost(3)">3</button>
  <button data-filter="cost-4" onclick="filterCost(4)">4</button>
  <button data-filter="cost-5" onclick="filterCost(5)">5</button>
  <button data-filter="cost-6" onclick="filterCost(6)">6</button>
  <button data-filter="cost-7" onclick="filterCost(7)">7</button>
  <button data-filter="cost-8" onclick="filterCost(8)">8</button>
  <button data-filter="cost-9" onclick="filterCost(9)">9</button>
  <button data-filter="cost-10" onclick="filterCost(10)">10</button>
</div>

</div>

  <section id="cardList" class="card-grid"></section>

  <div id="cardPopup" class="popup" style="display:none;">
    <div class="popup-card">
      <span onclick="closeCard()" class="close">✕</span>
      <h2 id="popupName"></h2>
      <p id="popupInfo"></p>
      <p id="popupStats"></p>
      <p id="popupText"></p>
    </div>
  </div>

  <script src="js/cardlist.js"></script>
</body>
</html>
