<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CROWNWar ルール</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
  <header class="page-header">
    <h1>ルール</h1>
    <a href="index.html">TOPへ戻る</a>
  </header>

  <main class="page rule">
    <h2>基本ルール</h2>
    <p>デッキは60枚。王はデッキ枚数に含まれない。</p>
    <p>同名カードは6枚まで。SRは同名3枚まで。</p>
    <p>相手の王HPを0にしたプレイヤーの勝利。</p>

    <h2>ターンの流れ</h2>
    <p>開始 → 2ドロー → 忠誠獲得 → メイン → 終了</p>

    <h2>盤面</h2>
    <p>前列3枠、後列3枠。前列は攻撃、後列は応援ができる。</p>
  </main>
</body>
